!DOCTYPE html>
<html>
<head>
    <title>CPAK LOUNGE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>CPAK LOUNGE</h1>
    <p>2, Akosile Close, Ijora Badia, Lagos</p>
    <p>Call/WhatsApp: 0911 211 3542</p>

    <h2>Available Rooms</h2>

    <div class="rooms">

        {% for room in rooms %}
        <div class="room-card">
            <img src="{{ url_for('static', filename='images/' + room.image) }}" alt="{{ room.name }}">
            <h3>{{ room.name }}</h3>
            <p>Price: ₦{{ room.price }}</p>

            <form action="/book" method="POST">
                <input type="hidden" name="room" value="{{ room.name }}">

                <label>Your Full Name</label>
                <input type="text" name="name" required>

                <label>Your Phone Number</label>
                <input type="text" name="phone" required>

                <label>Check-in Date</label>
                <input type="date" name="checkin" required>

                <label>Check-out Date</label>
                <input type="date" name="checkout" required>

                <button type="submit">Book Now (WhatsApp)</button>
            </form>
        </div>
        {% endfor %}

    </div>

</body>
</html>
